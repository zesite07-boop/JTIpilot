<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>JTIPilot</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F4F6FA;
  --white:#ffffff;
  --border:#EDEEF2;
  --text:#1e293b;
  --muted:#94a3b8;
  --muted2:#64748b;
  --accent:#f97316;
  --green:#22c55e;
  --blue:#3b82f6;
  --amber:#f59e0b;
  --red:#ef4444;
  --purple:#a855f7;
  --cyan:#06b6d4;
  --sans:"IBM Plex Sans",sans-serif;
  --mono:"IBM Plex Mono",monospace;
  --nav-w:220px;
  --top-h:56px;
  --radius:8px;
  --radius-lg:10px;
}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);overflow:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:2px;}

/* ── SIDEBAR ── */
.nav{
  position:fixed;top:0;left:0;bottom:0;width:var(--nav-w);
  background:var(--white);border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:200;overflow-y:auto;
}
.nav-logo{
  height:var(--top-h);padding:0 20px;
  display:flex;align-items:center;
  border-bottom:1px solid var(--border);
  font-size:17px;font-weight:600;color:var(--text);
  flex-shrink:0;letter-spacing:-0.3px;
}
.nav-logo em{color:var(--accent);font-style:normal;}
.nav-section{
  font-size:9px;font-weight:500;color:var(--muted);
  letter-spacing:1.3px;text-transform:uppercase;
  padding:14px 20px 4px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 20px;font-size:12px;color:var(--muted2);
  cursor:pointer;transition:all .12s;
  border-right:3px solid transparent;
  user-select:none;
}
.nav-item:hover{background:var(--bg);color:var(--text);}
.nav-item.active{background:#FFF4EE;color:var(--accent);border-right-color:var(--accent);font-weight:500;}
.nav-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.nav-badge{
  margin-left:auto;font-size:9px;font-weight:500;
  padding:1px 6px;border-radius:10px;
}
.nb-orange{background:#FFF4EE;color:var(--accent);}
.nb-green{background:#DCFCE7;color:#16a34a;}
.nb-purple{background:#F3E8FF;color:#9333ea;}
.nb-red{background:#FEE2E2;color:#dc2626;}
.nav-bottom{
  margin-top:auto;padding:12px 20px;
  border-top:1px solid var(--border);
  font-family:var(--mono);font-size:9px;color:var(--muted);
}

/* ── TOPBAR ── */
.topbar{
  position:fixed;top:0;left:var(--nav-w);right:0;height:var(--top-h);
  background:var(--white);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;gap:12px;z-index:100;
}
.topbar-title{font-size:17px;font-weight:500;color:var(--text);}
.topbar-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
.btn{
  font-size:12px;font-weight:500;padding:7px 14px;
  border-radius:6px;cursor:pointer;border:none;
  font-family:var(--sans);transition:opacity .12s;
}
.btn:hover{opacity:.85;}
.btn-ghost{background:var(--white);border:1px solid var(--border);color:var(--muted2);}
.btn-primary{background:var(--accent);color:#fff;}

/* ── MAIN ── */
.main{
  position:fixed;top:var(--top-h);left:var(--nav-w);right:0;bottom:0;
  overflow-y:auto;background:var(--bg);
}

/* ── KPI STRIP ── */
.kpi-strip{
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
  padding:14px 24px;background:var(--white);
  border-bottom:1px solid var(--border);
}
.kpi{background:var(--bg);border-radius:var(--radius);padding:12px 14px;}
.kpi-n{font-size:22px;font-weight:500;line-height:1.1;}
.kpi-l{font-size:10px;color:var(--muted);margin-top:2px;}
.kpi-bar{height:3px;background:#E2E8F0;border-radius:2px;margin-top:8px;overflow:hidden;}
.kpi-bar-fill{height:100%;border-radius:2px;transition:width .4s;}

/* ── BOARD ── */
.board{padding:16px 24px;display:flex;flex-direction:column;gap:10px;}

/* ── GROUPE ── */
.group{background:var(--white);border-radius:var(--radius-lg);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.group-header{
  display:flex;align-items:center;gap:10px;padding:12px 16px;
  cursor:pointer;border-left:4px solid transparent;
  transition:background .12s;user-select:none;
}
.group-header:hover{background:#FAFBFF;}
.gh-orange{border-left-color:var(--accent);}
.gh-red{border-left-color:var(--red);}
.gh-blue{border-left-color:var(--blue);}
.gh-amber{border-left-color:var(--amber);}
.gh-purple{border-left-color:var(--purple);}
.gh-gray{border-left-color:var(--muted);}
.group-title{font-size:13px;font-weight:500;color:var(--text);}
.group-count{font-size:11px;color:var(--muted);}
.group-chevron{margin-left:auto;font-size:11px;color:var(--muted);transition:transform .2s;}
.group-chevron.open{transform:rotate(180deg);}
.group-body{display:none;}
.group-body.open{display:block;}

/* ── COL HEADERS ── */
.col-headers{
  display:grid;gap:0;
  padding:5px 16px;
  background:#F8F9FB;
  border-top:1px solid var(--border);
  border-bottom:1px solid #F1F5F9;
}
.col-h{font-size:9px;color:var(--muted);font-weight:500;letter-spacing:.8px;text-transform:uppercase;}

/* ── PULSE ROW ── */
.pulse-row{
  display:grid;gap:0;align-items:center;
  padding:10px 16px;border-bottom:1px solid #F8F9FB;
  transition:background .12s;cursor:pointer;
}
.pulse-row:last-child{border-bottom:none;}
.pulse-row:hover{background:#FAFBFF;}
.pulse-row:hover .row-name{color:var(--accent);}
.row-name{font-size:13px;font-weight:500;color:var(--text);transition:color .12s;line-height:1.3;}
.row-sub{font-size:10px;color:var(--muted);margin-top:1px;}

/* ── STATUS BUTTONS ── */
.sb{
  display:inline-flex;align-items:center;justify-content:center;
  padding:6px 10px;border-radius:6px;
  font-size:11px;font-weight:500;color:#fff;
  min-width:96px;text-align:center;
  cursor:pointer;transition:opacity .12s;border:none;
  font-family:var(--sans);
}
.sb:hover{opacity:.85;}
.sb-green{background:var(--green);}
.sb-orange{background:var(--accent);}
.sb-amber{background:var(--amber);}
.sb-red{background:var(--red);}
.sb-blue{background:var(--blue);}
.sb-purple{background:var(--purple);}
.sb-gray{background:var(--muted);}
.sb-cyan{background:var(--cyan);}
.sb-pink{background:#ec4899;}

/* ── ACTION TAGS ── */
.at{font-size:10px;font-weight:500;padding:3px 8px;border-radius:4px;white-space:nowrap;}
.at-orange{background:#FFF4EE;color:var(--accent);}
.at-red{background:#FEE2E2;color:#dc2626;}
.at-amber{background:#FEF3C7;color:#d97706;}
.at-blue{background:#DBEAFE;color:#2563eb;}
.at-green{background:#DCFCE7;color:#16a34a;}
.at-gray{background:#F1F5F9;color:var(--muted2);}

/* ── TAUX / DATE ── */
.cell-taux{font-size:12px;font-weight:500;color:var(--text);}
.cell-date{font-size:11px;color:var(--muted2);}

/* ── EMPTY STATE ── */
.group-empty{
  padding:20px 16px;
  text-align:center;font-size:12px;color:var(--muted);
  font-family:var(--mono);
}

/* ── MODULE PLACEHOLDER ── */
.module-ph{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:60vh;
  color:var(--muted);font-size:12px;gap:8px;
  font-family:var(--mono);
}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .kpi-strip{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav" id="nav">
  <div class="nav-logo">JT<em>Pilot</em></div>

  <div class="nav-section">Opérationnel</div>
  <div class="nav-item active" data-mod="today" onclick="navigateTo('today')">
    <div class="nav-dot" style="background:var(--accent)"></div>
    Aujourd'hui
    <span class="nav-badge nb-red" id="badge-today">—</span>
  </div>
  <div class="nav-item" data-mod="tdb" onclick="navigateTo('tdb')">
    <div class="nav-dot" style="background:var(--blue)"></div>
    Tableau de Bord
  </div>
  <div class="nav-item" data-mod="crm" onclick="navigateTo('crm')">
    <div class="nav-dot" style="background:var(--blue)"></div>
    CRM Prospection
    <span class="nav-badge nb-orange" id="badge-crm">—</span>
  </div>
  <div class="nav-item" data-mod="candidats" onclick="navigateTo('candidats')">
    <div class="nav-dot" style="background:var(--green)"></div>
    Candidats
    <span class="nav-badge nb-green" id="badge-cands">—</span>
  </div>
  <div class="nav-item" data-mod="missions" onclick="navigateTo('missions')">
    <div class="nav-dot" style="background:var(--purple)"></div>
    Missions
    <span class="nav-badge nb-purple" id="badge-missions">—</span>
  </div>
  <div class="nav-item" data-mod="marge" onclick="navigateTo('marge')">
    <div class="nav-dot" style="background:var(--muted)"></div>
    Fiche Marge
  </div>

  <div class="nav-section">Pilotage</div>
  <div class="nav-item" data-mod="pl" onclick="navigateTo('pl')">

    Simulateur P&amp;L
  </div>

  <div class="nav-section">Référence</div>
  <div class="nav-item" data-mod="juridique" onclick="navigateTo('juridique')">
    <div class="nav-dot" style="background:var(--muted)"></div>
    Juridique
  </div>
  <div class="nav-item" data-mod="objections" onclick="navigateTo('objections')">
    <div class="nav-dot" style="background:var(--muted)"></div>

  </div>
  <div class="nav-item" data-mod="rome" onclick="navigateTo('rome')">

  </div>

  <div class="nav-section">Données</div>
  <div class="nav-item" onclick="navigateTo('import')">

  </div>

  <div class="nav-bottom" id="nav-clock"></div>
</nav>

<!-- TOPBAR -->
<div class="topbar">
  <div>
    <div class="topbar-title" id="topbar-title">Aujourd'hui</div>
    <div class="topbar-sub" id="topbar-sub"></div>
  </div>
  <div class="topbar-right">
    <div id="topbar-kpis" style="display:flex;gap:8px;"></div>
    <button class="btn btn-ghost" onclick="exportAll()">Export JSON</button>
    <button class="btn btn-primary" onclick="navigateTo('crm')">+ Nouveau besoin</button>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main">
  <!-- Iframes modules externes -->
  <iframe id="if-tdb"        src="tdb.html"        style="display:none;width:100%;height:100%;border:none;"></iframe>
  <iframe id="if-crm"        src="crm2.html"       style="display:none;width:100%;height:100%;border:none;"></iframe>
  <iframe id="if-candidats"  src="candidats2.html" style="display:none;width:100%;height:100%;border:none;"></iframe>
  <iframe id="if-missions"   src="missions.html"   style="display:none;width:100%;height:100%;border:none;"></iframe>
  <iframe id="if-marge"      src="marge2.html"     style="display:none;width:100%;height:100%;border:none;"></iframe>
  <iframe id="if-pl"         src="pl.html"         style="display:none;width:100%;height:100%;border:none;"></iframe>
  <iframe id="if-juridique"  src="juridique.html"  style="display:none;width:100%;height:100%;border:none;"></iframe>
  <iframe id="if-objections" src="objections.html" style="display:none;width:100%;height:100%;border:none;"></iframe>
  <iframe id="if-rome"       src="rome.html"       style="display:none;width:100%;height:100%;border:none;"></iframe>
  <iframe id="if-parametres" src="parametres.html" style="display:none;width:100%;height:100%;border:none;"></iframe>
  <iframe id="if-import"     src="import_demo.html" style="display:none;width:100%;height:100%;border:none;"></iframe>

  <!-- Dashboard Today (rendu dynamiquement) -->
  <div id="today-view"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// DONNÉES
// ═══════════════════════════════════════════════
var crmDB = [], candsDB = [], agenceDB = {};

function loadAll() {
  try { crmDB   = JSON.parse(localStorage.getItem('crm_btp_db') || '[]'); } catch(e) { crmDB=[]; }
  try { candsDB  = JSON.parse(localStorage.getItem('cands_btp_v2') || '[]'); } catch(e) { candsDB=[]; }
  try { agenceDB = JSON.parse(localStorage.getItem('agence_btp') || '{}'); } catch(e) { agenceDB={}; }
  crmDB = crmDB.map(function(p){ if(p.statut) p.statut=p.statut.toLowerCase().trim(); return p; });
}

// ═══════════════════════════════════════════════
// UTILITAIRES
// ═══════════════════════════════════════════════
function today() { return new Date().toISOString().slice(0,10); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(d) { if(!d) return '—'; var p=d.split('-'); return p[2]+'/'+p[1]+'/'+p[0].slice(2); }
function daysLeft(d) { if(!d) return null; return Math.round((new Date(d)-new Date(today()))/86400000); }
function isOD(d) { return d && d < today(); }
function isTD(d) { return d === today(); }
function nrm(s) { return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
var TITLES = {
  today:'Aujourd\'hui', tdb:'Tableau de Bord RA', crm:'CRM Prospection',
  candidats:'Base Candidats', missions:'Missions', marge:'Fiche Marge',
  pl:'Simulateur P&L', juridique:'Guide Juridique', objections:'Objections',
  rome:'Référentiel ROME', parametres:'Paramètres', import:'Import Logiciels'
};
var IFRAME_MODS = ['tdb','crm','candidats','missions','marge','pl','juridique','objections','rome','parametres','import'];

function navigateTo(mod) {
  loadAll();

  // Nav active
  document.querySelectorAll('.nav-item').forEach(function(el){
    el.classList.toggle('active', el.dataset.mod === mod);
  });

  // Topbar
  document.getElementById('topbar-title').textContent = TITLES[mod] || mod;

  // Masquer toutes les iframes + today-view
  IFRAME_MODS.forEach(function(m){
    var ifr = document.getElementById('if-'+m);
    if(ifr) ifr.style.display = 'none';
  });
  document.getElementById('today-view').style.display = 'none';

  if(mod === 'today') {
    document.getElementById('today-view').style.display = 'block';
    renderToday();
  } else {
    var ifr = document.getElementById('if-'+mod);
    if(ifr) {
      ifr.style.display = 'block';
      ifr.style.width = '100%';
      ifr.style.height = '100%';
    }
  }

  refreshBadges();
}

// ═══════════════════════════════════════════════
// BADGES NAV
// ═══════════════════════════════════════════════
function refreshBadges() {
  var nChaud  = crmDB.filter(function(p){ return p.statut==='chaud'; }).length;
  var nDispo  = candsDB.filter(function(c){ return c.dispo==='dispo'; }).length;
  var nMis    = candsDB.filter(function(c){ return c.dispo==='mission'; }).length;
  var nRetard = crmDB.filter(function(p){ return p.nextDate && isOD(p.nextDate); }).length;
  var nDemar  = candsDB.filter(function(c){ return c.dispo==='mission' && c.mission && isTD(c.mission.date_debut); }).length;
  var nBesoins = crmDB.reduce(function(a,p){ return a+(p.besoins||[]).filter(function(b){ return !b.clos && (b.statut==='ouvert'||b.statut==='encours'); }).length; }, 0);
  var nToday  = nDemar + nRetard;

  var b;
  b=document.getElementById('badge-today');   if(b) b.textContent = nToday||'—';
  b=document.getElementById('badge-crm');     if(b) b.textContent = nChaud+' chauds';
  b=document.getElementById('badge-cands');   if(b) b.textContent = nDispo+' dispo';
  b=document.getElementById('badge-missions');if(b) b.textContent = nMis||'—';

  // Topbar KPIs rapides
  var tk = document.getElementById('topbar-kpis');
  if(tk) tk.innerHTML = ''
    + kpiChip('Prospects', crmDB.length, '#64748b')
    + kpiChip('Missions', nMis, '#a855f7')
    + kpiChip('Dispo', nDispo, '#22c55e');
}

function kpiChip(label, val, color) {
  return '<div style="font-size:11px;padding:4px 10px;border-radius:4px;background:var(--white);border:1px solid var(--border);color:'+color+';font-weight:500">'
    + label + ' <strong>' + val + '</strong></div>';
}

// ═══════════════════════════════════════════════
// KPI STRIP
// ═══════════════════════════════════════════════
function buildKPIStrip() {
  var nMis    = candsDB.filter(function(c){ return c.dispo==='mission'; }).length;
  var tdbCfg  = {};
  try { tdbCfg = JSON.parse(localStorage.getItem('tdb_cfg')||'{}'); } catch(e){}
  var tc      = parseFloat(tdbCfg.tc || 34);
  var tb      = parseFloat(tdbCfg.tb || 15.5);
  var ff      = parseFloat(tdbCfg.ff || 12000);
  var seuil   = parseFloat(tdbCfg.seuilEtp || 9);
  var hSem    = parseFloat(tdbCfg.h || 35);
  var hMois   = hSem * 47 / 12;
  var charges = 0.43;
  var sbBase  = nMis * hMois * tb;
  var ifm     = sbBase * 0.10;
  var icp     = (sbBase+ifm) * 0.10;
  var ms      = (sbBase+ifm+icp) * (1+charges);
  var ca      = nMis * hMois * tc;
  var mb      = ca - ms;
  var mbPct   = ca > 0 ? Math.round(mb/ca*1000)/10 : 0;
  var rbe     = mb - ff;
  var etpPct  = seuil > 0 ? Math.min(100, Math.round(nMis/seuil*100)) : 100;

  var kpis = [
    { n: nMis+' ETP', l: 'Seuil '+seuil+' — '+(nMis>=seuil?'dépassé ✓':'à combler'), c: nMis>=seuil?'#22c55e':'#f59e0b', pct: etpPct, pc: nMis>=seuil?'#22c55e':'#f59e0b' },
    { n: mbPct+'%',   l: 'Marge brute — obj 18%', c: mbPct>=18?'#22c55e':mbPct>=12?'#3b82f6':'#ef4444', pct: Math.min(100,Math.round(mbPct/18*100)), pc: '#3b82f6' },
    { n: fmtCA(ca),   l: 'CA estimé mensuel', c: '#f97316', pct: 68, pc: '#f97316' },
    { n: (rbe>=0?'+':'')+fmtCA(rbe), l: 'RBE — FF '+(ff/1000)+'k€', c: rbe>=0?'#a855f7':'#ef4444', pct: rbe>=0?100:30, pc: rbe>=0?'#a855f7':'#ef4444' },
  ];

  return '<div class="kpi-strip">'
    + kpis.map(function(k){
        return '<div class="kpi">'
          + '<div class="kpi-n" style="color:'+k.c+'">'+k.n+'</div>'
          + '<div class="kpi-l">'+k.l+'</div>'
          + '<div class="kpi-bar"><div class="kpi-bar-fill" style="width:'+k.pct+'%;background:'+k.pc+'"></div></div>'
          + '</div>';
      }).join('')
    + '</div>';
}

function fmtCA(n) {
  if(Math.abs(n) >= 1000) return (Math.round(n/100)/10).toFixed(1)+'k€';
  return Math.round(n)+'€';
}

// ═══════════════════════════════════════════════
// GROUPES DASHBOARD TODAY
// ═══════════════════════════════════════════════
function renderToday() {
  var sub = document.getElementById('topbar-sub');
  if(sub) sub.textContent = new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  var html = buildKPIStrip();
  html += '<div class="board">';
  html += groupDemarrages();
  html += groupBesoins();
  html += groupFins();
  html += groupProspection();
  html += groupRecouvrement();
  html += '</div>';

  document.getElementById('today-view').innerHTML = html;

  // Event listeners groupes
  document.querySelectorAll('.group-header').forEach(function(h){
    h.addEventListener('click', function(){
      var body = this.nextElementSibling;
      if(!body) return;
      body.classList.toggle('open');
      var chev = this.querySelector('.group-chevron');
      if(chev) chev.classList.toggle('open');
    });
  });

  // Ouvrir les groupes non-vides par défaut
  document.querySelectorAll('.group-body').forEach(function(b){
    var empty = b.querySelector('.group-empty');
    if(!empty) { b.classList.add('open'); }
    var chev = b.previousElementSibling && b.previousElementSibling.querySelector('.group-chevron');
    if(!empty && chev) chev.classList.add('open');
  });
}

// ── GROUPE 1 : Démarrages du jour ──────────────
function groupDemarrages() {
  var td = today();
  var rows = candsDB.filter(function(c){
    return c.mission && c.mission.date_debut && c.mission.date_debut === td;
  });

  var cols = 'grid-template-columns:2fr 1.2fr 1fr 0.8fr 1fr';
  var body = '';

  if(rows.length) {
    body += '<div class="col-headers" style="'+cols+'">'
      + '<div class="col-h">Intérimaire — Client</div>'
      + '<div class="col-h">Statut</div>'
      + '<div class="col-h">Qualification</div>'
      + '<div class="col-h">TXH</div>'
      + '<div class="col-h">Action</div>'
      + '</div>';
    rows.forEach(function(c){
      var statut = c.dispo === 'mission' ? 'Actif' : 'À confirmer';
      var contrat = c.checks && c.checks.contrat_signe;
      var rh = c.checks && c.checks.rh_vierge;
      var sb = 'sb-green';
      var action = '<span class="at at-green">Contrat ✓</span>';
      if(!contrat) { sb='sb-amber'; action='<span class="at at-amber">Contrat à envoyer</span>'; }
      if(!rh && !c.checks) { action='<span class="at at-red">RH manquant</span>'; sb='sb-red'; }
      body += '<div class="pulse-row" style="'+cols+'" onclick="navigateTo(\'candidats\')">'
        + '<div><div class="row-name">'+esc((c.prenom||'')+' '+c.nom)+'</div>'
        + '<div class="row-sub">'+esc(c.mission.client||'—')+' · '+(c.mission.adresse||c.mission.cp_chantier||'')+'</div></div>'
        + '<div><button class="sb '+sb+'">'+statut+'</button></div>'
        + '<div class="row-sub">'+esc(c.qualif||'—')+'</div>'
        + '<div class="cell-taux">'+(c.mission.tc||c.taux||'—')+'€/h</div>'
        + '<div>'+action+'</div>'
        + '</div>';
    });
  } else {
    body += '<div class="group-empty">Aucun démarrage prévu aujourd\'hui</div>';
  }

  return group('Démarrages du jour', rows.length+' mission'+(rows.length>1?'s':''), 'gh-orange', body);
}

// ── GROUPE 2 : Besoins non pourvus ─────────────
function groupBesoins() {
  var besoins = [];
  crmDB.forEach(function(p){
    (p.besoins||[]).forEach(function(b){
      if(!b.clos && (b.statut==='ouvert'||b.statut==='encours')) {
        besoins.push({ client:p.nom, qualif:b.qualif||'—', nb:b.nb||1,
          statut:b.statut, date:b.date, tauxClient:b.taux_client||'—',
          pid:p.id, bid:b.id });
      }
    });
  });
  besoins.sort(function(a,b){ return (a.date||'9999').localeCompare(b.date||'9999'); });

  var cols = 'grid-template-columns:2fr 1.2fr 1fr 0.8fr 1fr';
  var body = '';

  if(besoins.length) {
    body += '<div class="col-headers" style="'+cols+'">'
      + '<div class="col-h">Besoin — Client</div>'
      + '<div class="col-h">Urgence</div>'
      + '<div class="col-h">Vivier</div>'
      + '<div class="col-h">TC client</div>'
      + '<div class="col-h">Action</div>'
      + '</div>';
    besoins.slice(0,8).forEach(function(b){
      var dl = daysLeft(b.date);
      var urgSB = 'sb-blue'; var urgLabel = 'En cours';
      var actTag = '<span class="at at-blue">Sourcer</span>';
      if(dl !== null && dl <= 0) { urgSB='sb-red'; urgLabel='Aujourd\'hui'; actTag='<span class="at at-red">Envoyer CV</span>'; }
      else if(dl !== null && dl <= 2) { urgSB='sb-orange'; urgLabel='J+'+dl; actTag='<span class="at at-orange">Relancer</span>'; }
      else if(dl !== null && dl <= 7) { urgSB='sb-amber'; urgLabel='J+'+dl; actTag='<span class="at at-amber">Préparer</span>'; }
      // Candidats disponibles correspondants
      var vivier = candsDB.filter(function(c){
        return c.dispo==='dispo' && nrm(c.qualif||'').indexOf(nrm(b.qualif).split(' ')[0]) >= 0;
      }).length;
      var vivierLabel = vivier > 0 ? vivier+' dispo' : 'Sourcing';
      body += '<div class="pulse-row" style="'+cols+'" onclick="navigateTo(\'crm\')">'
        + '<div><div class="row-name">'+esc(b.qualif)+'</div>'
        + '<div class="row-sub">'+esc(b.client)+' · '+(b.nb>1?b.nb+' postes':'1 poste')+'</div></div>'
        + '<div><button class="sb '+urgSB+'">'+urgLabel+'</button></div>'
        + '<div class="row-sub">'+esc(vivierLabel)+'</div>'
        + '<div class="cell-taux">'+esc(String(b.tauxClient))+'€/h</div>'
        + '<div>'+actTag+'</div>'
        + '</div>';
    });
    if(besoins.length > 8) {
      body += '<div style="padding:8px 16px;font-size:11px;color:var(--muted);font-style:italic">'+(besoins.length-8)+' autres besoins — voir CRM</div>';
    }
  } else {
    body += '<div class="group-empty">Aucun besoin ouvert</div>';
  }

  return group('Besoins non pourvus', besoins.length+' ouvert'+(besoins.length>1?'s':''), 'gh-red', body);
}

// ── GROUPE 3 : Fins de mission ─────────────────
function groupFins() {
  var fins = candsDB.filter(function(c){
    if(c.dispo !== 'mission' || !c.mission || !c.mission.date_fin) return false;
    var dl = daysLeft(c.mission.date_fin);
    return dl !== null && dl >= 0 && dl <= 7;
  }).sort(function(a,b){
    return daysLeft(a.mission.date_fin) - daysLeft(b.mission.date_fin);
  });

  var cols = 'grid-template-columns:2fr 1.2fr 1fr 0.8fr 1fr';
  var body = '';

  if(fins.length) {
    body += '<div class="col-headers" style="'+cols+'">'
      + '<div class="col-h">Intérimaire — Client</div>'
      + '<div class="col-h">Décision</div>'
      + '<div class="col-h">Fin prévue</div>'
      + '<div class="col-h">Impact</div>'
      + '<div class="col-h">Action</div>'
      + '</div>';
    fins.forEach(function(c){
      var dl = daysLeft(c.mission.date_fin);
      var sb = dl === 0 ? 'sb-red' : dl <= 2 ? 'sb-orange' : 'sb-amber';
      var label = dl === 0 ? 'Aujourd\'hui' : 'J+'+dl;
      var tdbCfg = {}; try { tdbCfg=JSON.parse(localStorage.getItem('tdb_cfg')||'{}'); } catch(e){}
      var hMois = (parseFloat(tdbCfg.h||35))*47/12;
      var tc = parseFloat(c.mission.tc||tdbCfg.tc||34);
      var impact = Math.round(tc * hMois / 100) / 10;
      body += '<div class="pulse-row" style="'+cols+'" onclick="navigateTo(\'candidats\')">'
        + '<div><div class="row-name">'+esc((c.prenom||'')+' '+c.nom)+'</div>'
        + '<div class="row-sub">'+esc(c.mission.client||'—')+'</div></div>'
        + '<div><button class="sb '+sb+'">'+label+'</button></div>'
        + '<div class="cell-date">'+fmt(c.mission.date_fin)+'</div>'
        + '<div class="cell-taux" style="color:#f59e0b">'+impact+'k€/mois</div>'
        + '<div><span class="at at-amber">Décision</span></div>'
        + '</div>';
    });
  } else {
    body += '<div class="group-empty">Aucune fin de mission dans 7 jours</div>';
  }

  return group('Fins de mission — 7 jours', fins.length+' mission'+(fins.length>1?'s':''), 'gh-blue', body);
}

// ── GROUPE 4 : Prospection du jour ─────────────
function groupProspection() {
  var actions = crmDB.filter(function(p){
    return p.nextDate && (isOD(p.nextDate) || isTD(p.nextDate));
  }).sort(function(a,b){
    return (a.nextDate||'9999').localeCompare(b.nextDate||'9999');
  });

  var TYPES = {
    appel:{l:'Appel',sb:'sb-blue'},email:{l:'Email',sb:'sb-purple'},
    rdv:{l:'RDV',sb:'sb-green'},cv:{l:'CV',sb:'sb-amber'},
    relance:{l:'Relance',sb:'sb-orange'},note:{l:'Note',sb:'sb-gray'}
  };

  var cols = 'grid-template-columns:2fr 1.2fr 1fr 1fr 0.8fr';
  var body = '';

  if(actions.length) {
    body += '<div class="col-headers" style="'+cols+'">'
      + '<div class="col-h">Prospect — Statut</div>'
      + '<div class="col-h">Action</div>'
      + '<div class="col-h">Détail</div>'
      + '<div class="col-h">Date</div>'
      + '<div class="col-h">Urgence</div>'
      + '</div>';
    actions.slice(0,8).forEach(function(p){
      var t = TYPES[p.nextType] || TYPES.note;
      var retard = isOD(p.nextDate);
      var statSB = p.statut==='chaud'?'sb-red':p.statut==='tiede'?'sb-amber':p.statut==='client'?'sb-green':'sb-gray';
      var statL  = p.statut ? p.statut.charAt(0).toUpperCase()+p.statut.slice(1) : '—';
      body += '<div class="pulse-row" style="'+cols+'" onclick="navigateTo(\'crm\')">'
        + '<div><div class="row-name">'+esc(p.nom||'—')+'</div>'
        + '<div class="row-sub">'+(p.metier||p.secteur||'—')+'</div></div>'
        + '<div><button class="sb '+t.sb+'">'+t.l+'</button></div>'
        + '<div class="row-sub">'+esc((p.nextDetail||'—').slice(0,30))+'</div>'
        + '<div class="cell-date" style="'+(retard?'color:var(--red)':'')+'">'+fmt(p.nextDate)+'</div>'
        + '<div><button class="sb '+statSB+'">'+statL+'</button></div>'
        + '</div>';
    });
    if(actions.length > 8) {
      body += '<div style="padding:8px 16px;font-size:11px;color:var(--muted);font-style:italic">'+(actions.length-8)+' autres actions — voir CRM</div>';
    }
  } else {
    body += '<div class="group-empty">Aucune action planifiée aujourd\'hui</div>';
  }

  return group('Prospection du jour', actions.length+' action'+(actions.length>1?'s':''), 'gh-purple', body);
}

// ── GROUPE 5 : Recouvrement ────────────────────
function groupRecouvrement() {
  var tdbCfg = {}; try { tdbCfg=JSON.parse(localStorage.getItem('tdb_cfg')||'{}'); } catch(e){}
  var impaye = parseFloat(tdbCfg.impaye || 0);

  // RH manquants = candidats en mission sans journal d'activité récent
  var rhManquants = candsDB.filter(function(c){
    return c.dispo === 'mission' && (!c.journal || c.journal.length === 0);
  });

  var body = '';
  if(impaye > 0 || rhManquants.length > 0) {
    var cols = 'grid-template-columns:2fr 1.5fr 1fr 1.5fr';
    body += '<div class="col-headers" style="'+cols+'">'
      + '<div class="col-h">Sujet</div>'
      + '<div class="col-h">Type</div>'
      + '<div class="col-h">Montant / Info</div>'
      + '<div class="col-h">Action</div>'
      + '</div>';
    if(impaye > 0) {
      body += '<div class="pulse-row" style="'+cols+'" onclick="navigateTo(\'tdb\')">'
        + '<div><div class="row-name">Factures impayées</div><div class="row-sub">Retard de règlement</div></div>'
        + '<div><button class="sb sb-red">Retard</button></div>'
        + '<div class="cell-taux">'+(impaye/1000).toFixed(1)+'k€</div>'
        + '<div><span class="at at-red">Relancer client</span></div>'
        + '</div>';
    }
    rhManquants.slice(0,5).forEach(function(c){
      body += '<div class="pulse-row" style="'+cols+'" onclick="navigateTo(\'candidats\')">'
        + '<div><div class="row-name">'+esc((c.prenom||'')+' '+c.nom)+'</div>'
        + '<div class="row-sub">'+esc(c.mission&&c.mission.client||'—')+'</div></div>'
        + '<div><button class="sb sb-amber">RH manquant</button></div>'
        + '<div class="cell-date">En mission</div>'
        + '<div><span class="at at-amber">Envoyer RH</span></div>'
        + '</div>';
    });
  } else {
    body += '<div class="group-empty">Aucun retard ni RH manquant</div>';
  }

  var total = (impaye>0?1:0) + rhManquants.length;
  return group('Recouvrement', total > 0 ? total+' alerte'+(total>1?'s':'') : 'À jour', 'gh-gray', body);
}

// ── HELPER : construire un groupe ──────────────
function group(title, count, cls, body) {
  return '<div class="group">'
    + '<div class="group-header '+cls+'">'
    + '<span class="group-title">'+title+'</span>'
    + '<span class="group-count">&nbsp;· '+count+'</span>'
    + '<span class="group-chevron">▼</span>'
    + '</div>'
    + '<div class="group-body">'+body+'</div>'
    + '</div>';
}

// ═══════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════
function exportAll() {
  var keys = ['crm_btp_db','cands_btp_v2','jtp_missions','grilles_btp','agence_btp','tdb_cfg'];
  var data = { exported: new Date().toISOString(), version:'2.0', app:'JTIPilot', data:{} };
  keys.forEach(function(k){ try{ data.data[k]=JSON.parse(localStorage.getItem(k)||'null'); }catch(e){} });
  var blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='jtipilot_backup_'+today()+'.json'; a.click();
}

// ═══════════════════════════════════════════════
// HORLOGE + RACCOURCIS + INIT
// ═══════════════════════════════════════════════
function clock() {
  var el = document.getElementById('nav-clock');
  if(el) el.textContent = new Date().toLocaleDateString('fr-FR') + ' · '
    + new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}

document.addEventListener('keydown', function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
  var map = {'1':'today','2':'tdb','3':'crm','4':'candidats','5':'missions','6':'marge'};
  if(map[e.key]) navigateTo(map[e.key]);
});

// Init
loadAll();
navigateTo('today');
clock();
setInterval(clock, 30000);
setInterval(function(){ loadAll(); refreshBadges(); }, 20000);
</script>
